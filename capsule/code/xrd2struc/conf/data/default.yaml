file_path: /data/mp20
datamodule:
  _target_: pxrdgen.data.datamodule.XRDDataModule
  datasets:
    train:
      _target_: pxrdgen.data.dataset.XRDDataset
      save_path: ${data.file_path}/train.pt
    valid:
      _target_: pxrdgen.data.dataset.XRDDataset
      save_path: ${data.file_path}/valid.pt
    test:
      _target_: pxrdgen.data.dataset.XRDDataset
      save_path: ${data.file_path}/test.pt
  num_workers: 4
  batch_size: 256

