_target_: pxrdgen.model.flow_shift_align.CSPFlow
time_dim: 256
cost_coord: 100.
cost_lattice: 1.
timesteps: 1000
align: false

encoder_xrd_fix: None
ckpt_path: ${workpath}/pre_ckpt/
encoder_xrd_ckpt: CL.ckpt
encoder_xrd:
  _target_: pxrdgen.model.encoder_xrd.xrd_encoder_T
  hidden_size: 128
  num_layers: 4
  num_heads: 4
  dropout: 0.1
  latent_size: ${model.time_dim}

decoder: 
  _target_: pxrdgen.model.cspnet.CSPNet
  hidden_dim: 512
  latent_dim: ${model.time_dim}
  max_atoms: 100
  num_layers: 6
  act_fn: silu
  dis_emb: sin
  num_freqs: 128
  ln: true
  ip: true
