_target_: pxrdgen.model.diffusion.LDiffusion
time_dim: 256
latent_dim: 256
timesteps: 1000

ckpt_path: ${workpath}/pre_ckpt/
encoder_xrd_fix: true
encoder_xrd_ckpt: CL.ckpt
encoder_xrd:
  _target_: pxrdgen.model.encoder_xrd.xrd_encoder_T
  hidden_size: 128
  num_layers: 4
  num_heads: 4
  dropout: 0.1
  latent_size: ${model.latent_dim}

decoder: 
  _target_: pxrdgen.model.decoder.SimpleNet
  latent_dim: ${model.latent_dim}
  time_dim: ${model.time_dim}
  hidden_dim1: 512
  hidden_dim2: 256
  fc_num_layers: 5

beta_scheduler: 
  _target_: pxrdgen.model.diff_utils.BetaScheduler
  timesteps: ${model.timesteps}
  scheduler_mode: cosine